<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'Morales & Rodríguez - Catálogo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <h1 class="logo">D'Morales & Rodríguez</h1>
            <nav class="menu">
                <a href="#masculina">Ropa Masculina</a>
                <a href="#femenina">Ropa Femenina</a>
                <a href="#moda">Accesorios Moda</a>
                <a href="#apple">Accesorios Apple</a>
            </nav>
        </div>
    </header>

    <main class="catalogo-container">

        <section id="masculina" class="categoria-section">
            <h2 class="titulo-categoria">Ropa Masculina</h2>
            <div id="grid-masculina" class="productos-grid">
            </div>
        </section>
        <section id="femenina" class="categoria-section">
            <h2 class="titulo-categoria">Ropa Femenina</h2>
            <div id="grid-femenina" class="productos-grid">
            </div>
        </section>

        <section id="moda" class="categoria-section">
            <h2 class="titulo-categoria">Accesorios de Moda</h2>
            <div id="grid-moda" class="productos-grid">
            </div>
        </section>

        <section id="apple" class="categoria-section">
            <h2 class="titulo-categoria">Accesorios Apple</h2>
            <div id="grid-apple" class="productos-grid">
            </div>
        </section>
    </main>
    <footer>
        <p>© 2026 D'Morales. Todos los derechos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
